name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Itenium.AuthCheck.slnx

      - name: Build
        run: dotnet build Itenium.AuthCheck.slnx --no-restore

      - name: Test
        run: dotnet test Itenium.AuthCheck.slnx --no-build --verbosity normal
